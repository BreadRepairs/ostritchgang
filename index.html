<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ostritch gang</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#090913;
color:white;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#a855f733 0%,transparent 40%),
radial-gradient(circle at bottom right,#9333ea22 0%,transparent 45%);
z-index:-1;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 10%;
}

.logo{
font-size:30px;
font-weight:700;
color:#c084fc;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
transition:.3s;
}

nav a:hover{
color:#c084fc;
}

.hero{
min-height:80vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:65px;
margin-bottom:15px;
}

.hero span{
color:#c084fc;
}

.hero p{
max-width:700px;
font-size:20px;
margin:auto;
}

.button{
display:inline-block;
margin-top:35px;
padding:15px 35px;
background:#9333ea;
color:white;
text-decoration:none;
border-radius:40px;
font-weight:600;
transition:.3s;
}

.button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #9333ea;
}

section{
padding:80px 10%;
}

.title{
font-size:42px;
text-align:center;
margin-bottom:40px;
}

.featured{
max-width:600px;
margin:auto;
background:#151521;
padding:30px;
border-radius:20px;
border:1px solid #2f2f40;
transition:.3s;
}

.featured:hover{
transform:translateY(-6px);
box-shadow:0 0 25px #9333ea66;
border-color:#c084fc;
}

.featured h2{
color:#c084fc;
margin-bottom:10px;
}

.featured p{
margin:10px 0;
color:#ddd;
}

.price{
font-size:22px;
font-weight:bold;
margin-top:20px;
color:#c084fc;
}

.stock{
margin-top:15px;
display:inline-block;
padding:8px 15px;
border-radius:999px;
font-weight:bold;
}

.in{
background:#1b4d2b;
color:#6cff9f;
}

.out{
background:#4b1d28;
color:#ff7d93;
}

footer{
padding:35px;
text-align:center;
opacity:.8;
}

@media(max-width:700px){

.hero h1{
font-size:45px;
}

.hero p{
font-size:18px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">ostritch gang</div>

<div>
<a href="#featured">featured</a>
<a href="shop.html">shop</a>
</div>

</nav>

<section class="hero">

<div>

<h1><span>ostritch</span><br>gang</h1>

<p>
welcome to ostritch gang.
we sell random things because why not.
have a look around.
</p>

<a class="button" href="shop.html">go to shop</a>

</div>

</section>

<section id="featured">

<h1 class="title">featured product</h1>

<div id="product" class="featured">

<p>loading...</p>

<a class="button" href="shop.html">buy now</a>
  
</div>

</section>

<footer>

© 2026 ostritch gang

</footer>

<script>

fetch("products.json")
.then(r=>r.json())
.then(data=>{

if(data.length===0){

document.getElementById("product").innerHTML=
"<h2>nothing here yet</h2><p>check the shop later.</p>";

return;

}

// First in-stock product, or the first product if none are in stock
const first=data.find(p=>p.stock) || data[0];

document.getElementById("product").innerHTML=`

<h2>${first.name}</h2>

<p>${first.description}</p>

<div class="price">${first.price}</div>

<div class="stock ${first.stock?"in":"out"}">

${first.stock?"🟢 in stock":"🔴 sold out"}

</div>

`;

});

</script>

</body>
</html>
